<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Viewer</title>
    <link rel="stylesheet" href="themes.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body data-theme="default">
    <div id="app-shell">
      <aside id="side-panel" aria-label="文档信息">
        <div id="side-panel-drag-region" data-tauri-drag-region></div>
        <div class="panel-header" data-tauri-drag-region>
          <h1 data-tauri-drag-region>资源管理器</h1>
        </div>
        <section id="workspace-section" aria-label="Markdown 文件">
          <div class="workspace-header">
            <span class="section-title">Files</span>
            <div class="workspace-actions">
              <button id="open-workspace-btn" type="button" title="打开目录" aria-label="打开目录">+</button>
              <button id="refresh-workspace-btn" type="button" title="刷新目录" aria-label="刷新目录">↻</button>
            </div>
          </div>
          <div id="workspace-browser">
            <ol id="workspace-file-list" class="file-list workspace-tree">
              <li class="file-list-empty">Drop a folder or Markdown file</li>
            </ol>
            <section id="loose-files-section" class="file-group" hidden>
              <div class="file-group-title">Single Files</div>
              <ol id="loose-file-list" class="file-list loose-file-list"></ol>
            </section>
          </div>
        </section>
        <div
          id="outline-resizer"
          class="panel-resizer"
          role="separator"
          aria-orientation="horizontal"
          aria-label="调整文件目录和文档目录大小"
          tabindex="0"
        ></div>
        <section id="outline-section" aria-label="文档目录">
          <div class="section-title">Document Outline</div>
          <ol id="document-outline" class="outline-list">
            <li class="outline-empty">Open a markdown file</li>
          </ol>
        </section>
        <div
          id="sidebar-resizer"
          role="separator"
          aria-orientation="vertical"
          aria-label="调整侧边栏宽度"
          tabindex="0"
        ></div>
      </aside>

      <main id="reader-pane">
        <div id="tab-bar">
          <div id="tab-list"></div>
          <div id="toolbar-actions">
            <div id="view-mode-toggle" aria-label="视图模式">
              <button type="button" data-view-mode="preview" aria-pressed="true" disabled>预览</button>
              <button type="button" data-view-mode="edit" aria-pressed="false" disabled>编辑</button>
              <button type="button" data-view-mode="split" aria-pressed="false" disabled>分屏</button>
            </div>
            <button id="save-md-btn" type="button" disabled title="保存 Markdown (⌘S)" aria-label="保存 Markdown">保存</button>
            <span id="editor-status" aria-live="polite"></span>
            <select id="theme-select" aria-label="主题"></select>
            <button id="typography-btn" title="主题字号" aria-label="主题字号">Aa</button>
            <div id="export-wrapper">
              <button id="export-btn" disabled>Export ▾</button>
              <div id="export-menu" class="hidden">
                <button data-format="html">导出 HTML</button>
                <button data-format="docx">导出 DOCX</button>
                <button data-format="print">打印 / PDF</button>
              </div>
            </div>
          </div>
        </div>
        <div id="reader-content">
          <div id="empty-state">
            <p>拖拽 Markdown 文件或目录到窗口打开</p>
            <p class="hint">拖入目录后，可以从左侧列表选择文档阅读</p>
          </div>
          <div id="document-workspace" class="mode-preview" hidden>
            <textarea
              id="markdown-editor"
              aria-label="Markdown 编辑器"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              autocorrect="off"
              wrap="soft"
            ></textarea>
            <article id="markdown-content" class="markdown-body"></article>
          </div>
        </div>
        <button id="back-to-top-btn" class="hidden" type="button" title="返回顶端" aria-label="返回顶端">↑</button>
      </main>
    </div>
    <div id="tab-context-menu" class="context-menu hidden" role="menu" aria-label="标签页菜单">
      <button type="button" data-tab-action="close-current">关闭当前标签页</button>
      <button type="button" data-tab-action="close-left">关闭左侧标签页</button>
      <button type="button" data-tab-action="close-right">关闭右侧标签页</button>
      <div class="context-menu-separator"></div>
      <button type="button" data-tab-action="close-all">关闭全部标签页</button>
    </div>
    <div id="workspace-context-menu" class="context-menu hidden" role="menu" aria-label="文件菜单">
      <button type="button" data-workspace-action="reveal">在文件管理器中显示</button>
      <div class="context-menu-separator"></div>
      <button type="button" data-workspace-action="close-folder">关闭文件夹</button>
      <button type="button" data-workspace-action="close-file">关闭文件</button>
    </div>
    <div id="image-context-menu" class="context-menu hidden" role="menu" aria-label="图片菜单">
      <button type="button" data-image-action="copy-image">复制图片</button>
    </div>
    <div id="settings-backdrop" class="hidden">
      <section id="typography-dialog" role="dialog" aria-modal="true" aria-labelledby="typography-title">
        <header class="dialog-header">
          <div>
            <h2 id="typography-title">主题字号</h2>
            <p id="typography-theme-name"></p>
          </div>
          <button id="typography-close" class="icon-button" aria-label="关闭">×</button>
        </header>
        <div class="scope-row">
          <label><input id="typography-preview-enabled" type="checkbox" /> 预览</label>
          <label><input id="typography-export-enabled" type="checkbox" /> DOCX</label>
        </div>
        <div id="typography-fields"></div>
        <footer class="dialog-actions">
          <button id="typography-reset" type="button">恢复默认</button>
          <span class="dialog-spacer"></span>
          <button id="typography-cancel" type="button">取消</button>
          <button id="typography-save" type="button">保存</button>
        </footer>
      </section>
    </div>
    <div id="update-backdrop" class="hidden">
      <section id="update-dialog" role="dialog" aria-modal="true" aria-labelledby="update-title">
        <header class="dialog-header">
          <div>
            <h2 id="update-title">发现新版本</h2>
            <p id="update-version"></p>
          </div>
          <button id="update-close" class="icon-button" type="button" aria-label="关闭">×</button>
        </header>
        <div id="update-body">
          <p id="update-notes"></p>
          <div id="update-progress" class="hidden" aria-live="polite">
            <div class="update-progress-track">
              <div id="update-progress-bar"></div>
            </div>
            <div id="update-progress-text">准备下载</div>
          </div>
          <p id="update-error" class="hidden"></p>
        </div>
        <footer class="dialog-actions">
          <button id="update-later" type="button">稍后再说</button>
          <span class="dialog-spacer"></span>
          <button id="update-install" type="button">立即更新</button>
        </footer>
      </section>
    </div>
    <div id="unsaved-backdrop" class="hidden">
      <section id="unsaved-dialog" role="dialog" aria-modal="true" aria-labelledby="unsaved-title">
        <header class="dialog-header">
          <div>
            <h2 id="unsaved-title">保存更改</h2>
            <p id="unsaved-file-name"></p>
          </div>
        </header>
        <p id="unsaved-message">这个文档有未保存的更改。</p>
        <footer class="dialog-actions">
          <button id="unsaved-discard" type="button" data-unsaved-action="discard">放弃更改</button>
          <span class="dialog-spacer"></span>
          <button id="unsaved-cancel" type="button" data-unsaved-action="cancel">取消</button>
          <button id="unsaved-save" type="button" data-unsaved-action="save">保存</button>
        </footer>
      </section>
    </div>
  </body>
</html>
