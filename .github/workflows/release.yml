name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            artifact-name: md-viewer-macos-apple-silicon
          - name: macOS Intel
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
            artifact-name: md-viewer-macos-intel
          - name: Windows
            platform: windows-latest
            rust-targets: ""
            args: --bundles nsis
            artifact-name: md-viewer-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read changelog
        id: changelog
        shell: bash
        run: |
          version="${{ inputs.tag || github.ref_name }}"
          version="${version#v}"
          body="$(awk -v version="$version" '
            $0 ~ "^## " version "([ -]|$)" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')"
          if [ -z "$body" ]; then
            body="See the assets below to download and install this version."
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: MD Viewer ${{ inputs.tag || github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz*
            src-tauri/target/**/release/bundle/nsis/*setup.exe
            src-tauri/target/**/release/bundle/nsis/*.sig
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false --prerelease=false --repo "$GITHUB_REPOSITORY"
